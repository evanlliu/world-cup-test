<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1739b8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="世界杯2026" />
  <meta name="format-detection" content="telephone=no" />
  <title>2026 世界杯赛程 v7</title>
  <script>
    (function(){
      var lang = (navigator.language || '').toLowerCase();
      var code = lang.indexOf('zh') === 0 ? 'zh' : (lang.indexOf('tr') === 0 ? 'tr' : 'en');
      var names = {
        zh: {title:'2026 世界杯赛程 v7', app:'世界杯2026', manifest:'./manifest.zh.webmanifest'},
        en: {title:'World Cup 2026 Schedule v7', app:'World Cup 2026', manifest:'./manifest.en.webmanifest'},
        tr: {title:'2026 Dünya Kupası Programı v7', app:'Dünya Kupası 2026', manifest:'./manifest.tr.webmanifest'}
      };
      var item = names[code] || names.en;
      document.title = item.title;
      var meta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if(meta) meta.setAttribute('content', item.app);
      var link = document.getElementById('manifestLink');
      if(!link){
        link = document.createElement('link');
        link.setAttribute('rel', 'manifest');
        link.setAttribute('id', 'manifestLink');
        document.head.appendChild(link);
      }
      link.setAttribute('href', item.manifest);
    })();
  </script>
  <link rel="preconnect" href="https://code.jquery.com" crossorigin />
  <link rel="dns-prefetch" href="//flagcdn.com" />
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
  <link rel="stylesheet" href="./assets/css/app.css?v=2" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="topbar">
        <div class="top-left">
          <div class="title" id="pageTitle"><span class="title-text">2026 世界杯</span><span class="version-badge">v7</span></div>
        </div>
        <div class="top-right">
          <button class="top-refresh-btn" id="refreshBtn" type="button" aria-label="刷新数据" title="刷新数据">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 6v5h-5"></path>
              <path d="M19.1 11A7.2 7.2 0 0 0 6.4 6.9L5 8.3"></path>
              <path d="M4 18v-5h5"></path>
              <path d="M4.9 13A7.2 7.2 0 0 0 17.6 17.1L19 15.7"></path>
            </svg>
          </button>
          <div class="lang-menu-wrap">
            <button class="lang-switch active" id="langMenuBtn" type="button" aria-expanded="false">中文</button>
            <div class="lang-menu" id="langMenu">
              <button class="lang-option" id="langZh" type="button" data-lang="zh">中文</button>
              <button class="lang-option" id="langEn" type="button" data-lang="en">English</button>
              <button class="lang-option" id="langTr" type="button" data-lang="tr">Türkçe</button>
            </div>
          </div>
        </div>
      </div>
      <nav class="tabs">
        <div class="tab active" data-tab="schedule" id="tabSchedule">赛程</div>
        <div class="tab" data-tab="standing" id="tabStanding">积分榜</div>
        <div class="tab" data-tab="players" id="tabPlayers">球员榜</div>
        <div class="tab" data-tab="teams" id="tabTeams">球队榜</div>
        <div class="tab" data-tab="bracket" id="tabBracket">晋级图</div>
      </nav>
    </header>

    <main class="main-panel">
      <section id="scheduleView">
        <div class="date-bar-wrap">
          <div class="date-bar-row">
            <div class="date-bar-scroll">
              <div class="date-bar" id="dateBar"></div>
            </div>
            <button class="date-more-btn" id="mobileMoreBtn" type="button" aria-expanded="false">
              <span class="date-more-icon" aria-hidden="true"><i></i><span></span></span>
              <span class="date-more-label" id="mobileMoreLabel">更多</span>
            </button>
          </div>
          <div class="mobile-filter-backdrop" id="mobileFilterBackdrop"></div>
          <div class="toolbar" id="mobileToolbar">
            <select class="tool-select" id="stageSelect"></select>
            <select class="tool-select" id="teamSelect"></select>
            <button class="tool-btn" id="resetBtn"></button>
            <button class="tool-btn" id="todayBtn"></button>
            <button class="tool-btn" id="allDatesBtn"></button>
            <div class="info-strip" id="infoStrip"></div>
          </div>
        </div>
        <section class="live-panel hidden" id="livePanel" aria-live="polite"></section>
        <div class="match-list" id="content">
          <div class="loading"><div class="spinner"></div><div id="loadingText">加载赛程中...</div></div>
        </div>
</section>

      <section class="hidden" id="otherView">
        <div class="empty" id="otherEmpty"></div>
      </section>
    </main>
  </div>

  <div class="prediction-page hidden" id="predictionPage">
    <div class="prediction-hero">
      <div class="prediction-nav">
        <button class="prediction-icon-btn" id="predictionBackBtn" type="button" aria-label="Back">‹</button>
        <div class="prediction-title" id="predictionHeaderTitle"></div>
      </div>
      <div class="prediction-summary" id="predictionHero"></div>
      <div class="prediction-segment">
        <button class="active" id="predictionPreviewTab" type="button"></button>
        <button id="predictionLiveTab" type="button"></button>
      </div>
    </div>
    <div class="prediction-scroll" id="predictionContent"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    window.addEventListener('load', function(){
      if(!window.jQuery){
        var content = document.getElementById('content');
        if(content){
          var lang = (navigator.language || '').toLowerCase();
          content.innerHTML = lang.startsWith('zh')
            ? '<div class="empty">页面依赖 jQuery CDN。当前网络无法加载，请检查网络，或后续改成本地 jQuery 文件。</div>'
            : (lang.startsWith('tr')
              ? '<div class="empty">Bu sayfa jQuery CDN gerektirir. Mevcut ağda CDN yüklenemiyor. Lütfen bağlantınızı kontrol edin veya daha sonra yerel jQuery dosyası kullanın.</div>'
              : '<div class="empty">This page requires the jQuery CDN. The CDN cannot be loaded on the current network. Please check your connection, or replace it with a local jQuery file later.</div>');
        }
      }
    });
  </script>
  <script src="./assets/js/app.js?v=2"></script>
</body>
</html>
